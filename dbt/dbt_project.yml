name: 'reference_data_platform'
version: '1.0.0'
config-version: 2

profile: 'data_platform'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Load metadata — used by Data Vault models for auditability
  load_datetime: "CURRENT_TIMESTAMP()"
  record_source: "'UNKNOWN'"
  hash_function: "SHA256"

models:
  reference_data_platform:
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]
    vault:
      +materialized: incremental
      +schema: vault
      +tags: ["vault"]
      +incremental_strategy: merge
      +on_schema_change: "append_new_columns"
    marts:
      +materialized: table
      +schema: marts
      +tags: ["marts"]

